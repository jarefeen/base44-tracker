name: Daily Snapshot

on:
  schedule:
    - cron: '0 8 * * *'  # Run daily at 8:00 AM UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-play-scraper google-api-python-client requests

      - name: Run snapshot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_PLAY_APP_ID: com.base44.android
          APP_STORE_APP_ID: '6749351042'
        run: python snapshot.py

      - name: Commit and push history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/history.json
          git diff --staged --quiet || git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
          git push
